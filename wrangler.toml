# Cloudflare Workers configuration
# This file is used by Wrangler CLI for deployment
# The build target is already set to Cloudflare in vite.config.ts via @lovable.dev/vite-tanstack-config

name = "mr-pinto-serrurier"
main = ".output/server/index.mjs"
compatibility_date = "2025-06-01"

# Node.js compatibility for packages that use Node built-ins
compatibility_flags = ["nodejs_compat"]

# Workers logs (optional)
# [observability]
# enabled = true
# head_sampling_rate = 1

# Custom domain (uncomment and set after first deploy)
# [[routes]]
# custom_domain = true
# pattern = "www.mrpinto.fr"

# Upload and serve the static files generated by Vite/Nitro.
# Without this block, files from public/ (including the favicon) return 404.
[assets]
directory = ".output/public"
binding = "ASSETS"
